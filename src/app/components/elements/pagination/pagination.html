@if (totalPages() > 1) {
  <nav class="components__elements__pagination" aria-label="Pagination">
    <button class="btn btn-secondary btn-sm" [disabled]="!hasPrev()" (click)="prev()" aria-label="Previous page">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>

    @for (p of pages(); track p) {
      <button
        class="btn btn-sm"
        [class.btn-primary]="p === page()"
        [class.btn-ghost]="p !== page()"
        (click)="go(p)"
        [attr.aria-current]="p === page() ? 'page' : null"
      >{{ p }}</button>
    }

    <button class="btn btn-secondary btn-sm" [disabled]="!hasNext()" (click)="next()" aria-label="Next page">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <path d="M6 3l5 5-5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </nav>
}
