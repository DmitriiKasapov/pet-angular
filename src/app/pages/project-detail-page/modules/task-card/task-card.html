<a
  [routerLink]="['/tasks', summary.task.id]"
  class="project-detail-page__modules__task-card card-interactive flex items-center gap-3 px-4 py-3"
  style="color: inherit; text-decoration: none;"
>
  <!-- Status badge -->
  <span [class]="statusClass" class="shrink-0">{{ statusLabel }}</span>

  <!-- Code -->
  <span class="text-xs font-mono shrink-0 w-20" style="color: var(--color-text-muted)">{{ summary.task.code }}</span>

  <!-- Title -->
  <span class="text-sm font-medium grow truncate" style="color: var(--color-text)">{{ summary.task.title }}</span>

  <!-- Hours -->
  <span class="text-xs shrink-0 tabular-nums" style="color: var(--color-text-muted)">
    {{ summary.loggedHours }}h
    @if (summary.task.estimatedHours) {
      <span style="color: var(--color-text-light)"> / {{ summary.task.estimatedHours }}h est</span>
    }
  </span>

  <!-- Arrow -->
  <svg class="shrink-0" style="color: var(--color-text-light)" width="14" height="14" viewBox="0 0 16 16" fill="none">
    <path d="M6 3l5 5-5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
</a>
