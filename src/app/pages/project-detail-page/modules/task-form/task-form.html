<app-modal-shell title="New Task" (closed)="cancelled.emit()">

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-4" novalidate>

    <!-- Title -->
    <div class="input-field">
      <label class="input-label" for="task-title">
        Title <span aria-hidden="true" style="color: var(--color-danger)">*</span>
        <span class="sr-only">(required)</span>
      </label>
      <input
        id="task-title"
        formControlName="title"
        class="input"
        [class.input-error]="isInvalid('title')"
        placeholder="e.g. Implement login page"
        autocomplete="off"
        aria-describedby="task-title-error"
        [attr.aria-invalid]="isInvalid('title') || null"
      />
      @if (isInvalid('title')) {
        <span id="task-title-error" class="input-error-msg" role="alert">
          Title is required (min 3 characters)
        </span>
      }
    </div>

    <!-- Description -->
    <div class="input-field">
      <label class="input-label" for="task-desc">Description</label>
      <textarea
        id="task-desc"
        formControlName="description"
        class="input resize-none"
        rows="2"
        placeholder="Short description of what needs to be done"
      ></textarea>
    </div>

    <!-- Status -->
    <div class="input-field">
      <label class="input-label" for="task-status">Status</label>
      <select id="task-status" formControlName="status" class="input">
        @for (opt of statusOptions; track opt.value) {
          <option [value]="opt.value">{{ opt.label }}</option>
        }
      </select>
    </div>

    <!-- Estimated hours -->
    <div class="input-field">
      <label class="input-label" for="task-estimate">Estimated hours</label>
      <input
        id="task-estimate"
        type="number"
        formControlName="estimatedHours"
        class="input"
        [class.input-error]="isInvalid('estimatedHours')"
        placeholder="e.g. 8"
        min="0.5"
        step="0.5"
        aria-describedby="task-estimate-error"
        [attr.aria-invalid]="isInvalid('estimatedHours') || null"
      />
      @if (isInvalid('estimatedHours')) {
        <span id="task-estimate-error" class="input-error-msg" role="alert">
          Must be between 0.5 and 999
        </span>
      }
    </div>

    <!-- Actions -->
    <div class="flex justify-end gap-2 pt-1">
      <button type="button" class="btn btn-secondary" (click)="cancelled.emit()">Cancel</button>
      <button type="submit" class="btn btn-primary">Create Task</button>
    </div>

  </form>

</app-modal-shell>
