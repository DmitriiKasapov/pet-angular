<section class="project-detail-page__blocks__project-analytics flex flex-col gap-5">
  <!-- Total summary -->
  <div
    class="flex items-center justify-between rounded-lg px-4 py-3"
    style="background: var(--color-primary-light); border: 1px solid var(--color-primary)"
  >
    <span class="text-sm font-medium" style="color: var(--color-primary)">Total logged hours</span>
    <span class="text-lg font-bold tabular-nums" style="color: var(--color-primary)">{{ totalHours }}h</span>
  </div>

  <!-- Per-task breakdown -->
  @if (sorted.length === 0) {
    <p class="text-sm py-8 text-center" style="color: var(--color-text-muted)">No worklog data yet</p>
  } @else {
    <div class="flex flex-col gap-3">
      @for (s of sorted; track s.task.id) {
        <div class="flex flex-col gap-1.5">
          <div class="flex items-center gap-3">
            <span [class]="statusClass(s.task.status)" class="shrink-0 text-xs">{{ statusLabel(s.task.status) }}</span>
            <span class="text-xs font-mono shrink-0 w-20" style="color: var(--color-text-muted)">{{ s.task.code }}</span>
            <span class="text-sm grow truncate" style="color: var(--color-text)">{{ s.task.title }}</span>
            <span class="text-sm font-semibold tabular-nums shrink-0" style="color: var(--color-text)">{{ s.loggedHours }}h</span>
          </div>
          <!-- Progress bar -->
          <div class="h-1.5 rounded-full" style="background: var(--color-border)">
            <div
              class="h-full rounded-full transition-all duration-300"
              style="background: var(--color-primary)"
              [style.width]="barWidth(s.loggedHours)"
            ></div>
          </div>
        </div>
      }
    </div>
  }
</section>
