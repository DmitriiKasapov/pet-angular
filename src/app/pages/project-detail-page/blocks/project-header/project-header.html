<section
  class="project-detail-page__blocks__project-header rounded-xl p-5 flex flex-col gap-3"
  style="background: var(--color-surface); border: 1px solid var(--color-border); box-shadow: var(--shadow-card)"
>
  <div class="flex items-center gap-3 flex-wrap">
    <!-- Color swatch -->
    <span class="w-3 h-3 rounded-full shrink-0" [style.background-color]="project.color"></span>

    <!-- Code badge -->
    <span
      class="badge font-mono text-xs font-semibold px-2 py-0.5 rounded"
      [style.background-color]="project.color + '22'"
      [style.color]="project.color"
    >{{ project.code }}</span>

    <!-- Name -->
    <h1 class="text-lg font-semibold" style="color: var(--color-text)">{{ project.name }}</h1>
  </div>

  @if (project.description) {
    <p class="text-sm" style="color: var(--color-text-muted)">{{ project.description }}</p>
  }

  <div class="flex items-center gap-5 text-sm" style="color: var(--color-text-muted)">
    <span>{{ taskCount }} {{ taskCount === 1 ? 'task' : 'tasks' }}</span>
    <span>{{ totalHours }}h logged</span>
  </div>
</section>
