<section class="analytics-page__blocks__projects-summary">
  <h2 class="summary-section__title">By project</h2>
  <div class="summary-rows">
    @for (project of projects; track project.projectId) {
      <div class="project-row">
        <div class="project-row__top">
          <span class="summary-row__color-dot" [style.background]="project.color"></span>
          <span class="summary-row__code">{{ project.code }}</span>
          <span class="project-row__name">{{ project.name }}</span>
          <span class="summary-row__value">{{ project.hours }}h</span>
        </div>
        <div class="summary-row__bar-wrap">
          <div class="summary-row__bar" [style.width.%]="barWidth(project.hours)" [style.background]="project.color"></div>
        </div>
      </div>
    }
  </div>
</section>
