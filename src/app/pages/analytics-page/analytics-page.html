<div class="analytics-page__root">

  <!-- Page header -->
  <div class="analytics-page__header">
    <h1>Analytics</h1>
    <app-week-nav
      [label]="weekLabel()"
      [isCurrentWeek]="isCurrentWeek()"
      (prev)="prevWeek()"
      (next)="nextWeek()"
      (goToday)="goToday()"
    />
  </div>

  <!-- Content -->
  @if (analytics().entryCount === 0) {
    <app-empty-state
      title="No entries this week"
      description="Log time on the Week board to see analytics here"
    />
  } @else {
    <app-week-summary [analytics]="analytics()" />
    <app-days-summary [days]="analytics().days" />
    <app-projects-summary [projects]="analytics().projects" />
    <app-tasks-summary [tasks]="analytics().tasks" />
  }

</div>
