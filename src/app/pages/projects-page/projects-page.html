<div class="projects-page flex flex-col gap-6 p-6 max-w-3xl mx-auto w-full">
  <header class="flex items-center justify-between gap-4">
    <h1 class="text-xl font-semibold" style="color: var(--color-text)">Projects</h1>
    <button class="btn btn-primary" (click)="showForm.set(true)">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      New Project
    </button>
  </header>

  <app-project-list
    [summaries]="summaries()"
    [query]="query()"
    (searchChange)="query.set($event)"
    (openForm)="showForm.set(true)"
  />

  @if (showForm()) {
    <app-project-form
      [existingCodes]="existingCodes()"
      (created)="onProjectCreated($event)"
      (cancelled)="showForm.set(false)"
    />
  }
</div>
