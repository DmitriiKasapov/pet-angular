<section class="projects-page__blocks__project-list flex flex-col gap-4">

  <!-- Search zone -->
  <div class="search-zone">
    <div class="relative">
      <svg
        class="absolute left-3 top-1/2 -translate-y-1/2 pointer-events-none"
        style="color: var(--color-text-light)"
        width="16" height="16" viewBox="0 0 16 16" fill="none"
      >
        <circle cx="7" cy="7" r="4.5" stroke="currentColor" stroke-width="1.4"/>
        <path d="M10.5 10.5l2.5 2.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
      <input
        type="search"
        class="input pl-9"
        placeholder="Search by project name, code or task…"
        [value]="query"
        (input)="onSearch($event)"
        aria-label="Search projects"
      />
    </div>
  </div>

  <!-- Results -->
  @if (summaries.length === 0 && query) {
    <app-empty-state
      title="No projects found"
      description="Try a different search query"
    />
  } @else if (summaries.length === 0) {
    <app-empty-state
      title="No projects yet"
      description="Create your first project to get started"
    >
      <button class="btn btn-primary" (click)="openForm.emit()">New Project</button>
    </app-empty-state>
  } @else {
    <div class="flex flex-col gap-3">
      @for (s of paged(); track s.project.id) {
        <app-project-card [summary]="s" />
      }
    </div>

    <app-pagination
      [page]="page()"
      [total]="summaries.length"
      [pageSize]="pageSize"
      (pageChange)="page.set($event)"
    />
  }
</section>
