<div class="weekly-board-page max-w-[1200px] mx-auto px-4 py-6">
  <!-- Header -->
  <div class="flex items-center justify-between mb-4">
    <div class="flex items-center gap-2">
      <button class="btn btn-secondary btn-sm" (click)="prevWeek()">← Prev</button>
      <span class="text-sm font-medium px-2" style="color: var(--color-text)">{{ weekLabel() }}</span>
      <button class="btn btn-secondary btn-sm" (click)="nextWeek()">Next →</button>
    </div>
  </div>

  <!-- Board grid -->
  <app-board-grid
    [entries]="entries()"
    [tasks]="tasks()"
    [projects]="projects()"
    [weekDays]="weekDays()"
    (entryUpdated)="onEntryUpdated($event)"
    (entryDeleted)="onEntryDeleted($event)"
    (entryEdit)="onEntryEdit($event)"
    (columnClick)="onColumnClick($event)"
  />

  <!-- Create form -->
  @if (showForm()) {
    <app-board-worklog-form
      [tasks]="tasks()"
      [weekDays]="weekDays()"
      [initialDate]="formDefaults().date"
      [initialStartHour]="formDefaults().startHour"
      (created)="onEntryCreated($event)"
      (cancelled)="showForm.set(false)"
    />
  }

  <!-- Edit form -->
  @if (editingEntry()) {
    <app-board-worklog-form
      [tasks]="tasks()"
      [weekDays]="weekDays()"
      [editEntry]="editingEntry()"
      (updated)="onEntryUpdatedFromForm($event)"
      (cancelled)="editingEntry.set(null)"
    />
  }
</div>
