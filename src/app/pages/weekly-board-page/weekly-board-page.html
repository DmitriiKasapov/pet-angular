<div class="weekly-board-page max-w-[1200px] mx-auto px-4 py-6">

  <!-- Week navigation -->
  <div class="flex items-center justify-between mb-4 flex-wrap gap-2">
    <app-week-nav
      [label]="weekLabel()"
      [isCurrentWeek]="isCurrentWeek()"
      (prev)="prevWeek()"
      (next)="nextWeek()"
      (goToday)="goToCurrentWeek()"
    />
  </div>

  <!-- Board grid (scrollable on mobile) -->
  <div class="overflow-x-auto">
    <div style="min-width: 600px">
      <app-board-grid
        [entries]="entries()"
        [tasks]="tasks()"
        [projects]="projects()"
        [weekDays]="weekDays()"
        (entryUpdated)="onEntryUpdated($event)"
        (entryDeleted)="onEntryDeleted($event)"
        (entryEdit)="onEntryEdit($event)"
        (columnClick)="onColumnClick($event)"
      />
    </div>
  </div>

  <!-- Create form -->
  @if (showForm()) {
    <app-board-worklog-form
      [tasks]="tasks()"
      [weekDays]="weekDays()"
      [initialDate]="formDefaults().date"
      [initialStartHour]="formDefaults().startHour"
      (created)="onEntryCreated($event)"
      (cancelled)="showForm.set(false)"
    />
  }

  <!-- Edit form -->
  @if (editingEntry()) {
    <app-board-worklog-form
      [tasks]="tasks()"
      [weekDays]="weekDays()"
      [editEntry]="editingEntry()"
      (updated)="onEntryUpdatedFromForm($event)"
      (cancelled)="editingEntry.set(null)"
    />
  }

</div>
