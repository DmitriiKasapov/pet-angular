<app-modal-shell [title]="isEditMode ? 'Edit Entry' : 'Log Work'" (closed)="cancelled.emit()">

  <form [formGroup]="form" (ngSubmit)="submit()" class="flex flex-col gap-4" novalidate>

    <!-- Task search -->
    <div class="input-field">
      <label class="input-label" for="wbf-task">Task</label>
      <div class="relative">
        <input
          id="wbf-task"
          type="text"
          class="input w-full"
          placeholder="Search by code or title…"
          [(ngModel)]="searchQuery"
          [ngModelOptions]="{standalone: true}"
          (input)="onSearchInput()"
          (keydown)="onSearchKeydown($event)"
          (focus)="dropdownOpen = true"
          (blur)="closeDropdown()"
          autocomplete="off"
          role="combobox"
          aria-autocomplete="list"
          [attr.aria-expanded]="dropdownOpen"
          aria-haspopup="listbox"
          aria-owns="wbf-task-listbox"
          [attr.aria-activedescendant]="activeIndex >= 0 ? 'wbf-option-' + activeIndex : null"
        />
        @if (dropdownOpen && filteredTasks.length > 0) {
          <ul
            id="wbf-task-listbox"
            class="absolute z-10 w-full mt-1 rounded-lg overflow-y-auto max-h-48"
            style="background: var(--color-surface); border: 1px solid var(--color-border); box-shadow: var(--shadow-dropdown)"
            role="listbox"
            aria-label="Available tasks"
          >
            @for (task of filteredTasks; track task.id; let i = $index) {
              <li
                [id]="'wbf-option-' + i"
                class="px-3 py-2 text-sm cursor-pointer"
                [class.bg-bg]="i === activeIndex"
                style="color: var(--color-text)"
                role="option"
                [attr.aria-selected]="i === activeIndex"
                (mousedown)="selectTask(task)"
              >
                <span class="font-mono text-xs" style="color: var(--color-text-muted)">{{ task.code }}</span>
                <span class="ml-2">{{ task.title }}</span>
              </li>
            }
          </ul>
        }
      </div>
    </div>

    <!-- Comment -->
    <div class="input-field">
      <label class="input-label" for="wbf-comment">
        Comment <span style="color: var(--color-text-light)">optional</span>
      </label>
      <textarea
        id="wbf-comment"
        formControlName="comment"
        rows="2"
        placeholder="What did you work on?"
        class="input resize-none"
      ></textarea>
    </div>

    <!-- Actions -->
    <div class="flex justify-end gap-2 pt-1">
      <button type="button" class="btn btn-secondary" (click)="cancelled.emit()">Cancel</button>
      <button type="submit" [disabled]="!selectedTask" class="btn btn-primary">
        {{ isEditMode ? 'Save' : 'Add Entry' }}
      </button>
    </div>

  </form>

</app-modal-shell>
