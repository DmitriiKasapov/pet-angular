<div class="task-detail-page__modules__worklog-entry flex items-start gap-4 px-4 py-3 bg-surface hover:bg-bg transition-colors">

  <!-- Date & duration -->
  <div class="flex-shrink-0 text-center min-w-[56px]">
    <div class="text-xs" style="color: var(--color-text-muted)">{{ entry.date }}</div>
    <div class="text-sm font-medium mt-0.5" style="color: var(--color-text)">{{ entry.durationHours }}h</div>
  </div>

  <!-- Start time & comment -->
  <div class="flex-1 min-w-0">
    <div class="text-xs" style="color: var(--color-text-muted)">Start: {{ formatTime(entry.startHour) }}</div>
    @if (entry.comment) {
      <p class="text-sm mt-0.5" style="color: var(--color-text)">{{ entry.comment }}</p>
    }
  </div>

</div>
