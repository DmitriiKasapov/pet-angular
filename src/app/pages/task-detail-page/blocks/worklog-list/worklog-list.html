<section class="task-detail-page__blocks__worklog-list">

  <!-- Header -->
  <div class="flex items-center justify-between mb-3">
    <h2 class="text-base font-semibold" style="color: var(--color-text)">Work Log</h2>
    @if (entries.length > 0) {
      <span class="text-sm" style="color: var(--color-text-muted)">
        Total: <span class="font-medium" style="color: var(--color-text)">{{ totalHours }}h</span>
      </span>
    }
  </div>

  @if (entries.length === 0) {
    <div class="py-6 text-center border border-border rounded-lg bg-bg">
      <p class="text-sm font-medium" style="color: var(--color-text)">No work logged yet</p>
      <p class="text-xs mt-1" style="color: var(--color-text-muted)">Log time on the Week board or add an entry below</p>
    </div>
  } @else {
    <div class="divide-y divide-border border border-border rounded-lg overflow-hidden">
      @for (entry of entries; track entry.id) {
        <app-worklog-entry [entry]="entry" />
      }
    </div>
  }

</section>
