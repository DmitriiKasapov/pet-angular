<section class="task-detail-page__blocks__task-header mb-6">
  <div class="flex items-center gap-2 text-sm text-text-muted mb-4">
    <a routerLink="/projects" class="hover:text-text transition-colors">Projects</a>
    <span>/</span>
    <a [routerLink]="['/projects', task.projectId]" class="hover:text-text transition-colors">Project</a>
    <span>/</span>
    <span class="text-text">{{ task.code }}</span>
  </div>

  <div class="flex items-start justify-between gap-4 flex-wrap">
    <div class="flex-1 min-w-0">
      <div class="flex items-center gap-3 mb-1">
        <span class="text-sm font-mono text-text-muted">{{ task.code }}</span>
        <span [class]="badgeClass(task.status)">{{ statusLabels[task.status] }}</span>
      </div>
      <h1 class="text-2xl font-semibold text-text">{{ task.title }}</h1>
      @if (task.description) {
        <p class="mt-2 text-text-muted text-sm leading-relaxed">{{ task.description }}</p>
      }
    </div>

    <div class="flex items-center gap-4 flex-shrink-0">
      @if (task.estimatedHours) {
        <div class="text-sm text-text-muted">
          Estimate: <span class="font-medium text-text">{{ task.estimatedHours }}h</span>
        </div>
      }
      <div class="text-sm text-text-muted">
        Created: <span class="font-medium text-text">{{ task.createdAt }}</span>
      </div>
    </div>
  </div>

  <div class="flex items-center gap-3 mt-4 pt-4 pb-4 border-t border-b border-border">
    <label class="text-sm font-medium text-text-muted" for="task-status">Status</label>
    <select
      id="task-status"
      [value]="task.status"
      (change)="onStatusChange($event)"
      class="input text-sm py-1 px-2 w-auto font-medium"
      [ngStyle]="selectStyle(task.status)"
    >
      @for (s of statuses; track s.value) {
        <option [value]="s.value" [selected]="task.status === s.value"
          [style.background-color]="s.bg" [style.color]="s.color">{{ s.label }}</option>
      }
    </select>
  </div>
</section>
