@if (task() === null) {
  <div class="flex flex-col items-center justify-center min-h-[50vh] gap-4">
    <p class="text-text-muted text-sm">Task not found.</p>
    <a routerLink="/projects" class="btn btn-secondary text-sm">Back to Projects</a>
  </div>
} @else {
  <div class="max-w-3xl mx-auto px-4 py-6">
    <app-task-header
      [task]="task()!"
      (statusChange)="onStatusChange($event)"
    />

    <!-- Add comment -->
    <div class="mt-6">
      <h2 class="text-base font-semibold text-text mb-4">New Comment</h2>
      <app-comment-form (submitted)="onCommentSubmit($event)" />
    </div>

    <!-- Comments list -->
    <app-comments-section [comments]="comments()" />
  </div>
}
